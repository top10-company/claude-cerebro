name: pesquisa-pessoas
description: PESQUISA DE PESSOAS — acha a FOTO REAL + função de uma pessoa CITADA no roteiro (executivo, autoridade, especialista, figura histórica), verifica a identidade por visão, trata a imagem e registra fonte/licença. Use sempre que uma cena cita ou mostra uma pessoa real. Fontes autorizadas: LinkedIn, site oficial da empresa/órgão, universidade, acervos e domínio público para históricos. NUNCA fabrica rosto. Com a marca do canal injetada, também monta a cena de citação (modo "citacao").
tools: Bash, Read, Write, Edit, Glob, Grep, WebSearch, WebFetch
model: opus
effort: medium   # acha e verifica foto real de pessoa citada
